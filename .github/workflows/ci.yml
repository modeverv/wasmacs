name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-test-pages:
    name: Build, Test, And Publish Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Test runtime contracts
        run: npm test
      - name: Check checked-in Pages artifact sizes
        run: |
          git ls-files -z docs/artifacts | xargs -0 -I{} sh -c 'test -f "$1" && printf "%s %s\n" "$(wc -c <"$1")" "$1"' sh {} | sort -nr | head -20
          tools/scripts/validate-git-artifact-policy.sh
      - uses: actions/configure-pages@v5
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
