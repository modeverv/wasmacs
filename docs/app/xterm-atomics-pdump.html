<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>wasmacs xterm (atomics + pdump)</title>
    <!--
      COI ServiceWorker: needed for SharedArrayBuffer in cross-origin contexts.
      Without COOP/COEP headers, SharedArrayBuffer is unavailable.
    -->
    <script src="../coi-serviceworker.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.js"></script>
    <style>
      body { margin: 0; background: #1a1a1a; color: #eee; font-family: monospace; }
      .shell { display: flex; flex-direction: column; height: 100vh; }
      .header {
        display: flex; align-items: center; gap: 8px; padding: 6px 12px;
        background: #2a2a2a; border-bottom: 1px solid #444; flex-shrink: 0;
        flex-wrap: wrap;
      }
      .header h1 { margin: 0; font-size: 13px; color: #aaa; white-space: nowrap; }
      #status { font-size: 12px; color: #888; flex: 1; min-width: 160px; }
      #status.interactive { color: #4caf50; font-weight: bold; }
      #status.generating { color: #ff9800; }
      #status.error { color: #f44336; }
      .btn {
        padding: 4px 10px; border: none; border-radius: 3px; cursor: pointer;
        font-size: 11px; color: #fff; white-space: nowrap;
      }
      .btn:disabled { opacity: 0.4; cursor: default; }
      .btn-start { background: #1976d2; }
      .btn-clear  { background: #5d4037; }
      .btn-export { background: #2e7d32; }
      #sab-status { font-size: 10px; color: #555; }
      #pdmp-status { font-size: 10px; color: #555; }
      #debug-panel {
        background: #111; border-bottom: 1px solid #333; font-size: 10px;
        font-family: monospace; max-height: 120px; overflow-y: auto;
        padding: 4px 8px; flex-shrink: 0; display: none;
      }
      #debug-panel.visible { display: block; }
      #debug-panel .cp { color: #4db6ac; }
      #debug-panel .err { color: #ef9a9a; }
      #debug-panel .info { color: #aaa; }
      #bin-info { font-size: 10px; color: #78909c; white-space: nowrap; }
      #xterm-container { flex: 1; overflow: hidden; padding: 2px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <h1>wasmacs <span style="color:#80cbc4">[atomics+pdump]</span></h1>
        <span id="status">idle</span>
        <span id="sab-status"></span>
        <span id="pdmp-status"></span>
        <button id="start-btn" class="btn btn-start" type="button">Start</button>
        <button id="clear-btn" class="btn btn-clear" type="button">Clear pdmp cache</button>
        <button id="import-btn" class="btn" style="background:#6a1b9a" type="button">Import .wasifs</button>
        <input id="wasifs-input" type="file" accept=".wasifs" style="display:none">
        <span id="import-status" style="font-size:10px;color:#ce93d8"></span>
        <button id="export-btn" class="btn btn-export" type="button">Export .wasifs</button>
        <button id="log-btn" class="btn" style="background:#37474f" type="button">Log ▾</button>
        <span id="bin-info">—</span>
      </div>
      <div id="debug-panel"></div>
      <div id="xterm-container"></div>
    </div>

    <script type="module">
import { createXtermEmacsTerminal, xtermDataToBytes } from "./src/xterm-emacs-terminal.js";

// ── DOM refs ────────────────────────────────────────────────────
const statusEl  = document.querySelector("#status");
const sabEl     = document.querySelector("#sab-status");
const pdmpEl    = document.querySelector("#pdmp-status");
const startBtn  = document.querySelector("#start-btn");
const clearBtn  = document.querySelector("#clear-btn");
const exportBtn    = document.querySelector("#export-btn");
const importBtn    = document.querySelector("#import-btn");
const wasifsInput  = document.querySelector("#wasifs-input");
const importStatus = document.querySelector("#import-status");
const container = document.querySelector("#xterm-container");
const debugPanel = document.querySelector("#debug-panel");
const binInfo   = document.querySelector("#bin-info");

// ── IndexedDB wasifs helpers (main page) ───────────────────────
const WASIFS_KEY     = "wasmacs:user-filesystem.wasifs:v1";
const WASIFS_IDB_DB  = "wasmacs-wasifs";
const WASIFS_IDB_ST  = "snapshots";

function openWasifsIDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(WASIFS_IDB_DB, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(WASIFS_IDB_ST);
    r.onsuccess = () => res(r.result);
    r.onerror   = () => rej(r.error);
  });
}
async function loadWasifsFromIDB() {
  try {
    const db = await openWasifsIDB();
    return new Promise(res => {
      const tx = db.transaction(WASIFS_IDB_ST, "readonly");
      const req = tx.objectStore(WASIFS_IDB_ST).get(WASIFS_KEY);
      req.onsuccess = () => { db.close(); res(req.result ?? null); };
      req.onerror   = () => { db.close(); res(null); };
    });
  } catch(_) { return null; }
}
async function saveWasifsToIDB(bytes) {
  try {
    const db = await openWasifsIDB();
    return new Promise(res => {
      const tx = db.transaction(WASIFS_IDB_ST, "readwrite");
      tx.objectStore(WASIFS_IDB_ST).put(bytes, WASIFS_KEY);
      tx.oncomplete = () => { db.close(); res(); };
      tx.onerror    = () => { db.close(); res(); };
    });
  } catch(_) {}
}

// pending import bytes (from file picker, before Start)
let pendingWasifsBytes = null;
// latest wasifs snapshot received from worker (updated before each Atomics.wait)
let latestWasifsBytes = null;

function refreshExportBtn() { /* export always enabled */ }

function toggleLog() {
  debugPanel.classList.toggle("visible");
}
function addLog(cls, text) {
  const d = document.createElement("div");
  d.className = cls;
  d.textContent = text;
  debugPanel.appendChild(d);
  debugPanel.scrollTop = debugPanel.scrollHeight;
}
// Auto-show log on first error
function addLogErr(text) {
  debugPanel.classList.add("visible");
  addLog("err", text);
}

// ── SharedArrayBuffer check ─────────────────────────────────────
const sabOK = typeof SharedArrayBuffer !== "undefined";
sabEl.textContent = sabOK ? "SAB ✓" : "SAB ✗";
if (!sabOK) sabEl.style.color = "#f44336";

function setStatus(text, cls = "") {
  statusEl.textContent = text;
  statusEl.className = cls;
}

// ── IndexedDB pdmp cache ────────────────────────────────────────
const IDB_DB   = "wasmacs-pdump-cache";
const IDB_STORE = "pdmps";
const IDB_KEY   = "bootstrap-emacs.pdmp";
const BUNDLED_PDMP_URL = "../artifacts/emacs-browser-atomics-pdump/bootstrap-emacs.pdmp";

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function loadCachedPdmp() {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, "readonly");
      const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = () => { db.close(); resolve(req.result ?? null); };
      req.onerror   = () => { db.close(); resolve(null); };
    });
  } catch (_) { return null; }
}

async function savePdmpToIDB(bytes) {
  try {
    const db = await openIDB();
    return new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).put(bytes, IDB_KEY);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror    = () => { db.close(); resolve(); };
    });
  } catch (_) {}
}

async function clearPdmpCache() {
  try {
    const db = await openIDB();
    await new Promise((resolve) => {
      const tx = db.transaction(IDB_STORE, "readwrite");
      tx.objectStore(IDB_STORE).delete(IDB_KEY);
      tx.oncomplete = () => { db.close(); resolve(); };
      tx.onerror    = () => { db.close(); resolve(); };
    });
  } catch (_) {}
}

async function loadBundledPdmp() {
  const resp = await fetch(`${BUNDLED_PDMP_URL}?v=${Date.now()}`, { cache: "no-store" });
  if (!resp.ok) throw new Error(`bundled pdmp fetch failed: ${resp.status}`);
  const bytes = new Uint8Array(await resp.arrayBuffer());
  pdmpEl.textContent = `artifact: ${(bytes.length / 1024 / 1024).toFixed(1)} MB`;
  return bytes;
}

// ── xterm setup ─────────────────────────────────────────────────
let terminal = null;
let inputSAB  = null;
let terminalSizeSAB = null;
let emacsWorker = null;
let lastTerminalSize = { cols: 80, rows: 24 };

function sendInputToEmacs(bytes) {
  if (!inputSAB || !bytes.length) return;
  const signal = new Int32Array(inputSAB, 0, 2);
  const data   = new Uint8Array(inputSAB, 8);
  const count  = Math.min(bytes.length, 256);
  for (let i = 0; i < count; i++) data[i] = bytes[i];
  Atomics.store(signal, 1, count);
  Atomics.add(signal, 0, 1);
  Atomics.notify(signal, 0, 1);
}

function publishTerminalSize(size) {
  lastTerminalSize = size;
  if (terminalSizeSAB) {
    const signal = new Int32Array(terminalSizeSAB);
    Atomics.store(signal, 1, size.cols);
    Atomics.store(signal, 2, size.rows);
    Atomics.add(signal, 0, 1);
  }
  if (inputSAB) {
    const inputSignal = new Int32Array(inputSAB, 0, 2);
    Atomics.add(inputSignal, 0, 1);
    Atomics.notify(inputSignal, 0, 1);
  }
  if (emacsWorker) emacsWorker.postMessage({ type: "terminal-resize", ...size });
}

function initTerminal() {
  if (terminal) return;
  terminal = createXtermEmacsTerminal(container, {
    onResize(size) {
      publishTerminalSize(size);
      addLog("info", `resize: ${size.cols}x${size.rows}`);
    },
  });
  terminal.onData((data) => sendInputToEmacs(xtermDataToBytes(data)));
  lastTerminalSize = terminal.getDimensions();
}

// ── Phase 1: Generate pdmp ──────────────────────────────────────
// Uses pdump-diagnostic-worker.js to run loadup+pbootstrap and capture
// the generated bootstrap-emacs.pdmp as base64.

function generatePdmp() {
  return new Promise((resolve, reject) => {
    setStatus("generating pdmp (loadup+pbootstrap)…", "generating");
    const worker = new Worker("./src/pdump-diagnostic-worker.js?v=" + Date.now());
    let resolved = false;

    worker.onmessage = (evt) => {
      const msg = evt.data;

      if (msg.type === "checkpoint" && msg.kind) {
        pdmpEl.textContent = msg.kind;
      }
      if (msg.type === "stderr") {
        // Show loadup progress without spamming status
        if (/Loading|Dump/.test(msg.text)) {
          pdmpEl.textContent = msg.text.slice(0, 60);
        }
      }
      if (msg.type === "pdmp-download") {
        if (!resolved) {
          resolved = true;
          worker.terminate();
          // Decode base64 → Uint8Array
          const raw = atob(msg.base64);
          const bytes = new Uint8Array(raw.length);
          for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
          pdmpEl.textContent = `pdmp ${(bytes.length / 1024 / 1024).toFixed(1)} MB`;
          resolve(bytes);
        }
      }
    };

    worker.onerror = (e) => {
      worker.terminate();
      reject(new Error(e.message || "generate worker error"));
    };

    // Timeout guard: loadup can take 1–3 min in browser
    setTimeout(() => {
      if (!resolved) {
        resolved = true;
        worker.terminate();
        reject(new Error("pdmp generate timeout (5 min)"));
      }
    }, 5 * 60 * 1000);

    worker.postMessage({ type: "generate" });
  });
}

// ── Phase 2: Run Emacs with pdmp ────────────────────────────────
function startEmacsWithPdmp(pdmpBytes) {
  if (!sabOK) { setStatus("SAB not available", "error"); return; }

  initTerminal();

  emacsWorker = new Worker("./src/emacs-atomics-pdump-worker.js?v=" + Date.now());
  lastTerminalSize = terminal.fit();

  emacsWorker.onmessage = (evt) => {
    const msg = evt.data;

    if (msg.type === "ready") {
      inputSAB = msg.sab;
      terminalSizeSAB = msg.terminalSizeSAB;
      publishTerminalSize(lastTerminalSize);
      setStatus("booting Emacs from pdmp…");
    }

    if (msg.type === "pdmp-materialized") {
      pdmpEl.textContent = `pdmp ${(msg.size / 1024 / 1024).toFixed(1)} MB materialized`;
    }

    if (msg.type === "wasifs-snapshot") {
      // Worker sends this at Emacs-owned wait/session boundaries.
      // Main page saves to IDB because its event loop stays free while the worker blocks.
      const bytes = new Uint8Array(msg.bytes);
      latestWasifsBytes = bytes;
      saveWasifsToIDB(bytes); // fire-and-forget: main page event loop is free
    }

    if (msg.type === "terminal-output-bytes" && terminal) {
      terminal.writeBytes(msg.bytes);
      if (!statusEl.classList.contains("interactive"))
        setStatus("interactive ✓", "interactive");
    }

    if (msg.type === "timing") {
      addLog("cp", `wait#${msg.waitNum} bytes=${msg.byteCount} queue=${msg.queueLen} fio=${msg.fioCalls}`);
      setStatus("interactive wait ✓", "interactive");
    }

    if (msg.type === "timing-wait-enter") {
      addLog("cp", `wait-enter#${msg.waitNum} queue=${msg.queueLen} out=${msg.outLen} fio=${msg.fioCalls}`);
      setStatus("interactive wait ✓", "interactive");
    }

    if (msg.type === "terminal-resized") {
      addLog("cp", `winsize: ${msg.cols}x${msg.rows} v${msg.version ?? "?"}`);
    }

    if (msg.type === "scheduler-checkpoint" || msg.type === "os-timing-checkpoint") {
      addLog("cp", `${msg.type}:${msg.code} queue=${msg.queueLen} out=${msg.outLen}`);
    }

    if (msg.type === "status") {
      if (!statusEl.classList.contains("interactive"))
        setStatus(msg.text);
    }

    if (msg.type === "wasifs-export-data") {
      // legacy path (not normally triggered now that export reads localStorage)
      refreshExportBtn();
    }

    if (msg.type === "binary-info") {
      binInfo.textContent = `${msg.artifactDir.split("/").pop()} thisProgram=${msg.thisProgram} callMain=${msg.callMainType}`;
      addLog("info", `binary: ${msg.artifactDir} | thisProgram=${msg.thisProgram} | callMain=${msg.callMainType}`);
    }
    if (msg.type === "stdout") { console.log("[emacs stdout]", msg.text); addLog("info", "OUT: " + msg.text); }
    if (msg.type === "stderr") {
      console.warn("[emacs stderr]", msg.text);
      const isErr = /error|failed|abort/i.test(msg.text);
      if (isErr) { addLogErr("ERR: " + msg.text); }
      else { addLog("cp", "ERR: " + msg.text); }
      if (isErr && !statusEl.classList.contains("interactive"))
        setStatus(`stderr: ${msg.text.slice(0, 80)}`, "error");
    }

    if (msg.type === "session-ended") {
      const err = msg.error ? ` — ${msg.error.slice(0, 80)}` : "";
      addLogErr(`session-ended status=${msg.status ?? "?"} ${msg.error ?? ""}`);
      setStatus(`ended (${msg.status ?? "?"}${err})`, "error");
      emacsWorker = null;
      startBtn.disabled = false;
      inputSAB = null;
      terminalSizeSAB = null;
      refreshExportBtn();
    }
  };

  emacsWorker.onerror = (e) => {
    setStatus(`worker error: ${e.message}`, "error");
    emacsWorker = null;
    startBtn.disabled = false;
    exportBtn.disabled = true;
    inputSAB = null;
    terminalSizeSAB = null;
  };

  // Send "start" immediately — worker calls startEmacs(pdmpBytes) which posts "ready".
  // Must NOT wait for "ready" first: that message only comes after "start" is received.
  const copy = new Uint8Array(pdmpBytes);
  emacsWorker.postMessage({
    type: "start",
    pdmpBytes: copy.buffer,
    terminalSize: lastTerminalSize,
  }, [copy.buffer]);
}

// ── Main start flow ─────────────────────────────────────────────
async function startSession() {
  if (!sabOK) { setStatus("SAB not available — need COOP/COEP headers", "error"); return; }
  if (emacsWorker) return;

  startBtn.disabled = true;

  let pdmpBytes;
  try {
    setStatus("loading bundled pdmp…");
    pdmpBytes = await loadBundledPdmp();
  } catch (artifactError) {
    setStatus("checking pdmp cache…");
    pdmpBytes = await loadCachedPdmp();

    if (pdmpBytes) {
      pdmpEl.textContent = `cache: ${(pdmpBytes.length / 1024 / 1024).toFixed(1)} MB`;
      setStatus("pdmp from cache");
    } else {
      try {
        pdmpBytes = await generatePdmp();
        setStatus("saving pdmp to cache…");
        await savePdmpToIDB(pdmpBytes);
        setStatus("pdmp cached");
      } catch (e) {
        setStatus(`generate failed: ${artifactError.message}; ${e.message}`, "error");
        startBtn.disabled = false;
        return;
      }
    }
  }

  setStatus("starting Emacs worker…");
  startEmacsWithPdmp(pdmpBytes);
}

startBtn.addEventListener("click", startSession);
document.querySelector("#log-btn").addEventListener("click", toggleLog);

clearBtn.addEventListener("click", async () => {
  await clearPdmpCache();
  pdmpEl.textContent = "cache cleared";
  setStatus("pdmp cache cleared — click Start to regenerate");
});

exportBtn.addEventListener("click", async () => {
  let bytes = latestWasifsBytes ?? pendingWasifsBytes ?? await loadWasifsFromIDB();
  if (!bytes) { setStatus("no wasifs data — run Emacs first", "error"); return; }
  if (!(bytes instanceof Uint8Array)) bytes = new Uint8Array(bytes);
  const blob = new Blob([bytes], { type: "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "user-filesystem.wasifs"; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  setStatus("exported ✓", "interactive");
});

importBtn.addEventListener("click", () => wasifsInput.click());

wasifsInput.addEventListener("change", () => {
  const file = wasifsInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    pendingWasifsBytes = new Uint8Array(e.target.result);
    await saveWasifsToIDB(pendingWasifsBytes);
    importStatus.textContent = `${file.name} (${(pendingWasifsBytes.length / 1024).toFixed(0)} KB) — will use at next Start`;
    refreshExportBtn();
    addLog("info", `import: ${file.name} ${pendingWasifsBytes.length} bytes -> IndexedDB`);
  };
  reader.readAsArrayBuffer(file);
  wasifsInput.value = "";
});

// Autostart if ?autostart in URL
if (new URLSearchParams(window.location.search).has("autostart")) startSession();
    </script>
  </body>
</html>
